<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Mahasiswa Sibuk</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
    background: #f5f5f2; color: #1a1a18;
    min-height: 100vh; padding: 2rem 1rem;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 2px; color: #1a1a18; }
  .tagline { font-size: 12px; color: #888780; margin-bottom: 20px; }

  .day-strip { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
  .dtab {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 0.5px solid #b4b2a9; color: #888780;
    background: transparent; transition: all .15s;
  }
  .dtab.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }

  .mode-strip { display: flex; gap: 6px; margin-bottom: 16px; }
  .mtab {
    flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 0.5px solid #d3d1c7; color: #888780;
    background: #f1efe8; text-align: center; transition: all .15s;
  }
  .mtab.m0.active { background: #f1efe8; color: #444441; border-color: #888780; }
  .mtab.m1.active { background: #e6f1fb; color: #0c447c; border-color: #378add; }
  .mtab.m2.active { background: #eeedfe; color: #3c3489; border-color: #534ab7; }
  .mtab.m3.active { background: #e1f5ee; color: #085041; border-color: #0f6e56; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 14px; }
  .scard { background: #ebebE4; border-radius: 8px; padding: 9px 8px; text-align: center; }
  .scard-val { font-size: 18px; font-weight: 500; color: #1a1a18; }
  .scard-lbl { font-size: 10px; color: #888780; margin-top: 2px; }

  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .pbar-wrap { flex: 1; height: 5px; background: #e0dfd8; border-radius: 20px; overflow: hidden; }
  .pbar { height: 5px; border-radius: 20px; transition: width .4s, background .4s; }
  .pct-label { font-size: 12px; color: #888780; min-width: 32px; text-align: right; }
  .reset-btn {
    font-size: 11px; color: #b4b2a9; cursor: pointer;
    border: none; background: none; padding: 0; text-decoration: underline;
  }

  .section { margin-bottom: 18px; }
  .sec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .sec-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sec-title { font-size: 13px; font-weight: 500; color: #1a1a18; }
  .sec-count { font-size: 11px; color: #888780; margin-left: auto; }

  .item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 0; border-bottom: 0.5px solid #e8e7e0; cursor: pointer;
  }
  .item:last-child { border-bottom: none; }
  .cb {
    width: 17px; height: 17px; border-radius: 4px;
    border: 1.5px solid #b4b2a9; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; transition: all .15s;
  }
  .cb.checked { background: #1a1a18; border-color: #1a1a18; }
  .cb.checked::after {
    content: ''; display: block; width: 5px; height: 9px;
    border: 2px solid #fff; border-top: none; border-left: none;
    transform: rotate(40deg) translateY(-1px);
  }
  .item-text { font-size: 13px; color: #1a1a18; line-height: 1.5; flex: 1; }
  .item.done .item-text { color: #b4b2a9; text-decoration: line-through; }

  .pill {
    font-size: 10px; padding: 2px 7px; border-radius: 10px;
    flex-shrink: 0; font-weight: 500; margin-top: 2px;
  }
  .p-kuliah  { background: #e6f1fb; color: #0c447c; }
  .p-kerja   { background: #eeedfe; color: #3c3489; }
  .p-orgs    { background: #e1f5ee; color: #085041; }
  .p-diri    { background: #faeeda; color: #633806; }
  .p-semua   { background: #f1efe8; color: #5f5e5a; }

  .reward-box {
    padding: 11px 14px; border-radius: 8px;
    background: #f1efe8; border: 0.5px solid #d3d1c7;
    font-size: 13px; color: #5f5e5a; text-align: center; margin-top: 14px;
  }

  .burnout-bar {
    margin-top: 12px; padding: 12px 14px; border-radius: 8px;
    border: 0.5px solid #d3d1c7; background: #f1efe8;
  }
  .burnout-label {
    font-size: 11px; color: #888780; margin-bottom: 6px;
    display: flex; justify-content: space-between;
  }
  .burnout-track {
    height: 5px; border-radius: 20px;
    background: #e0dfd8; overflow: hidden;
  }
  .burnout-fill { height: 5px; border-radius: 20px; transition: width .5s, background .5s; }
  .burnout-tip { font-size: 11px; color: #888780; margin-top: 6px; }

  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .mode-strip { flex-wrap: wrap; }
    .mtab { min-width: calc(50% - 6px); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Checklist mahasiswa sibuk</h1>
  <p class="tagline">Kuliah + kerja + organisasi — tiga peran, satu hari.</p>

  <div class="day-strip" id="daytabs"></div>

  <div class="mode-strip">
    <div class="mtab m0 active" onclick="setMode(0)">Semua</div>
    <div class="mtab m1" onclick="setMode(1)">Kuliah</div>
    <div class="mtab m2" onclick="setMode(2)">Kerja</div>
    <div class="mtab m3" onclick="setMode(3)">Organisasi</div>
  </div>

  <div class="stats-row" id="stats"></div>

  <div class="progress-row">
    <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
    <span class="pct-label" id="pct">0%</span>
    <button class="reset-btn" onclick="resetDay()">reset hari ini</button>
  </div>

  <div id="checklist"></div>

  <div class="reward-box" id="reward"></div>

  <div class="burnout-bar">
    <div class="burnout-label">
      <span>Level kelelahan minggu ini</span>
      <span id="burnout-pct">0%</span>
    </div>
    <div class="burnout-track"><div class="burnout-fill" id="burnout-fill"></div></div>
    <div class="burnout-tip" id="burnout-tip"></div>
  </div>
</div>

<script>
const DAYS = ['Sen','Sel','Rab','Kam','Jum','Sab','Min'];
const FULL_DAYS = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu','Minggu'];
const today = new Date().getDay();
const todayIdx = today === 0 ? 6 : today - 1;

const SECTIONS = [
  {
    title: 'Pagi: ritual bertahan hidup',
    color: '#888780', filter: 'semua',
    items: [
      { t: 'Bangun sesuai alarm — tidak ada negosiasi', pill: 'diri' },
      { t: 'Cek kalender hari ini: kuliah jam berapa, kerja shift apa, rapat org kapan', pill: 'semua' },
      { t: 'Tulis 3 prioritas hari ini (bukan semua hal, pilih 3 terpenting)', pill: 'semua' },
      { t: 'Makan sebelum berangkat — nggak ada yang produktif kalau lapar', pill: 'diri' },
    ]
  },
  {
    title: 'Kuliah: jangan sampai ketinggalan',
    color: '#378add', filter: 'kuliah',
    items: [
      { t: 'Cek jadwal kuliah & tugas yang jatuh tempo hari ini', pill: 'kuliah' },
      { t: 'Hadir kuliah atau minta catatan dari teman kalau tidak bisa', pill: 'kuliah' },
      { t: 'Tandai deadline tugas/UTS/UAS di kalender minggu ini', pill: 'kuliah' },
      { t: 'Kerjakan minimal 1 tugas kuliah hari ini walau cuma 30 menit', pill: 'kuliah' },
      { t: 'Kalau ada tugas kelompok, update progress ke anggota lain', pill: 'kuliah' },
    ]
  },
  {
    title: 'Kerja: profesional meski sibuk kuliah',
    color: '#7f77dd', filter: 'kerja',
    items: [
      { t: 'Konfirmasi jadwal shift hari ini ke atasan/grup kerja', pill: 'kerja' },
      { t: 'Selesaikan pekerjaan tepat waktu — reputasi lebih berharga dari gaji', pill: 'kerja' },
      { t: 'Pisahkan waktu kerja dan waktu kuliah secara tegas (jangan multitasking habis-habisan)', pill: 'kerja' },
      { t: 'Kalau ada konflik jadwal kerja vs kuliah, komunikasikan lebih awal', pill: 'kerja' },
    ]
  },
  {
    title: 'Organisasi: kontribusi tanpa tenggelam',
    color: '#1d9e75', filter: 'orgs',
    items: [
      { t: 'Cek agenda organisasi hari ini: ada rapat? deadline proker?', pill: 'orgs' },
      { t: 'Kerjakan tanggung jawab divisi duluan sebelum bantu divisi lain', pill: 'orgs' },
      { t: 'Belajar bilang "tidak" atau "nanti" untuk tambahan tugas kalau sudah overload', pill: 'orgs' },
      { t: 'Update progres tugasmu ke koordinator atau ketua', pill: 'orgs' },
    ]
  },
  {
    title: 'Manajemen waktu: taktik nyata',
    color: '#ba7517', filter: 'semua',
    items: [
      { t: 'Blok waktu "deep work" di kalender — satu sesi 90 menit tanpa gangguan', pill: 'semua' },
      { t: 'Kerjakan hal terberat di waktu paling produktifmu (biasanya pagi)', pill: 'semua' },
      { t: 'Gunakan waktu transit/perjalanan untuk baca materi atau balas pesan penting', pill: 'semua' },
      { t: 'Batasi scrolling sosmed: cek hanya 3x sehari (pagi, siang, malam)', pill: 'semua' },
      { t: 'Kalau jadwal bertabrakan, pakai matriks: mana yang penting & mendesak?', pill: 'semua' },
    ]
  },
  {
    title: 'Jaga diri: ini bukan bonus, ini wajib',
    color: '#d85a30', filter: 'semua',
    items: [
      { t: 'Tidur minimal 6 jam malam ini — utang tidur itu nyata', pill: 'diri' },
      { t: 'Makan minimal 2x hari ini (bukan cuma kopi dan camilan)', pill: 'diri' },
      { t: 'Ambil jeda 10 menit di tengah hari — istirahat bukan kelemahan', pill: 'diri' },
      { t: 'Satu hal yang kamu syukuri hari ini (tulis di catatan HP)', pill: 'diri' },
    ]
  }
];

const TOTAL = SECTIONS.reduce((s, sec) => s + sec.items.length, 0);

const REWARDS = [
  'Hari panjang, tapi kamu sudah mulai. Itu yang paling susah.',
  'Ada progres! Ingat: sedikit maju tetap maju.',
  'Sudah setengah perjalanan. Orang sesibuk ini butuh istirahat juga ya.',
  'Hampir selesai semua — kamu bukan manusia biasa.',
  'Semua done! Istirahat yang layak, besok perjuangan lanjut lagi.'
];

const BURNOUT_TIPS = [
  'Kondisi oke. Jaga ritme ini.',
  'Mulai padat. Pastikan ada waktu istirahat.',
  'Cukup berat. Prioritaskan yang paling penting, drop sisanya.',
  'Overload! Komunikasikan ke salah satu pihak kalau butuh keringanan.',
  'Hampir burnout. Minta tolong itu bukan tanda lemah.'
];

const BURNOUT_COLORS = ['#639922','#ba7517','#d85a30','#a32d2d','#791f1f'];

let curDay = todayIdx;
let curMode = 0;

const FLAT = [];
SECTIONS.forEach(sec => sec.items.forEach(item => FLAT.push({ ...item, secFilter: sec.filter })));

const savedRaw = localStorage.getItem('checklist_state_v2');
const state = savedRaw ? JSON.parse(savedRaw) : {};
DAYS.forEach(d => { if (!state[d]) state[d] = Array(TOTAL).fill(false); });

function save() { localStorage.setItem('checklist_state_v2', JSON.stringify(state)); }

function modeFilter(item) {
  if (curMode === 0) return true;
  const mmap = { 1: 'kuliah', 2: 'kerja', 3: 'orgs' };
  return item.secFilter === mmap[curMode] || item.secFilter === 'semua';
}

function renderTabs() {
  document.getElementById('daytabs').innerHTML = DAYS.map((d, i) =>
    `<div class="dtab${i === curDay ? ' active' : ''}" onclick="switchDay(${i})">${FULL_DAYS[i]}${i === todayIdx ? ' ·' : ''}</div>`
  ).join('');
}

function renderModes() {
  document.querySelectorAll('.mtab').forEach((el, i) => el.classList.toggle('active', i === curMode));
}

function renderStats() {
  const dayState = state[DAYS[curDay]];
  const done = dayState.filter(Boolean).length;
  const streak = (() => {
    let s = 0;
    for (let i = todayIdx; i >= 0; i--) {
      if (state[DAYS[i]].every(Boolean)) s++; else break;
    }
    return s;
  })();
  const weekly = DAYS.slice(0, todayIdx + 1).reduce((a, d) => a + state[d].filter(Boolean).length, 0);
  const skipped = DAYS.slice(0, todayIdx).filter(d => state[d].every(v => !v)).length;

  document.getElementById('stats').innerHTML = `
    <div class="scard"><div class="scard-val">${done}/${TOTAL}</div><div class="scard-lbl">hari ini</div></div>
    <div class="scard"><div class="scard-val">${streak}</div><div class="scard-lbl">hari beruntun</div></div>
    <div class="scard"><div class="scard-val">${weekly}</div><div class="scard-lbl">minggu ini</div></div>
    <div class="scard"><div class="scard-val">${skipped}</div><div class="scard-lbl">hari skip</div></div>
  `;

  const pct = Math.round(done / TOTAL * 100);
  const barColor = pct >= 80 ? '#639922' : pct >= 40 ? '#ba7517' : '#888780';
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('pbar').style.background = barColor;
  document.getElementById('pct').textContent = pct + '%';

  const ri = Math.min(Math.floor(pct / 25), REWARDS.length - 1);
  document.getElementById('reward').textContent = REWARDS[ri];

  const burnoutPct = Math.min(Math.round((skipped * 20 + Math.max(0, TOTAL - done) * 1.5) / (TOTAL * 1.5) * 100), 100);
  const bi = Math.min(Math.floor(burnoutPct / 25), BURNOUT_TIPS.length - 1);
  document.getElementById('burnout-pct').textContent = burnoutPct + '%';
  document.getElementById('burnout-fill').style.width = burnoutPct + '%';
  document.getElementById('burnout-fill').style.background = BURNOUT_COLORS[bi];
  document.getElementById('burnout-tip').textContent = BURNOUT_TIPS[bi];
}

function renderChecklist() {
  const dayState = state[DAYS[curDay]];
  let gi = 0, html = '';
  SECTIONS.forEach(sec => {
    const secStart = gi;
    const visible = sec.items.map((item, i) => ({
      ...item, gi: secStart + i,
      visible: modeFilter({ ...item, secFilter: sec.filter })
    })).filter(i => i.visible);
    gi += sec.items.length;
    if (!visible.length) return;
    const secDone = visible.filter(item => dayState[item.gi]).length;
    html += `<div class="section">
      <div class="sec-head">
        <div class="sec-dot" style="background:${sec.color}"></div>
        <span class="sec-title">${sec.title}</span>
        <span class="sec-count">${secDone}/${visible.length}</span>
      </div>`;
    visible.forEach(item => {
      const done = dayState[item.gi];
      html += `<div class="item${done ? ' done' : ''}" onclick="toggle(${item.gi})">
        <div class="cb${done ? ' checked' : ''}"></div>
        <span class="item-text">${item.t}</span>
        <span class="pill p-${item.pill}">${item.pill}</span>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('checklist').innerHTML = html;
}

function toggle(idx) {
  state[DAYS[curDay]][idx] = !state[DAYS[curDay]][idx];
  save(); renderChecklist(); renderStats();
}
function switchDay(i) { curDay = i; renderTabs(); renderChecklist(); renderStats(); }
function setMode(i) { curMode = i; renderModes(); renderChecklist(); renderStats(); }
function resetDay() { state[DAYS[curDay]] = Array(TOTAL).fill(false); save(); renderChecklist(); renderStats(); }

renderTabs(); renderModes(); renderStats(); renderChecklist();
</script>
</body>
</html>
